services:
  - type: web
    name: somali-news-lens
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /_stcore/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ENABLED
        value: "false"
      - key: MAX_FEEDS_PER_RUN
        value: "18"
      - key: MAX_ARTICLES_PER_FEED
        value: "6"
      - key: FEED_CONCURRENCY
        value: "2"
      - key: FEED_TIMEOUT_SECONDS
        value: "8"
      - key: MAX_AI_CLASSIFICATIONS_PER_RUN
        value: "0"
      - key: CACHE_TTL_SECONDS
        value: "900"
      - key: READER_LOOKBACK_DAYS
        value: "21"
      - key: READER_LATEST_LIMIT
        value: "36"
      - key: READER_SECTION_LIMIT
        value: "30"
      - key: DATABASE_URL
        fromDatabase:
          name: somali-news-db
          property: connectionString

databases:
  - name: somali-news-db
    plan: free
