services:
  - type: web
    name: somali-news-lens
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /_stcore/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ENABLED
        value: "true"
      - key: MAX_FEEDS_PER_RUN
        value: "31"
      - key: MAX_ARTICLES_PER_FEED
        value: "12"
      - key: FEED_CONCURRENCY
        value: "6"
      - key: DATABASE_URL
        fromDatabase:
          name: somali-news-db
          property: connectionString

databases:
  - name: somali-news-db
    plan: free
